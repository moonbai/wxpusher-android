name: Release Android Apk

on:
  pull_request:
    branches: [ unofficial_custom/* ]

  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 GitHub Release'
        required: false
        type: boolean
        default: false
      release_notes:
        description: '发布说明（可选）'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: mkdir android secrets dir
      run: mkdir -p secrets/android

    - name: Check keystore availability
      id: check_keystore
      run: |
        if [ -n "${{ secrets.APK_SIGN_JKS }}" ]; then
          echo "valid=true" >> $GITHUB_OUTPUT
        else
          echo "valid=false" >> $GITHUB_OUTPUT
        fi

    - name: Restore keystore file
      if: steps.check_keystore.outputs.valid == 'true'
      env:
        KEYSTORE_BASE64: ${{ secrets.APK_SIGN_JKS }}
      run: |
        echo $KEYSTORE_BASE64 | base64 -d > sign_keystore.jks
      working-directory: ./secrets/android

    - name: Create ALIYUN properties
      env:
        ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_SLS_ACCESS_KEY_ID }}
        ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_SLS_ACCESS_KEY_SECRET }}
      run: |
        echo "aliyun.sls.accessKeyId=${ALIYUN_ACCESS_KEY_ID:-}" >> key.properties
        echo "aliyun.sls.accessKeySecret=${ALIYUN_ACCESS_KEY_SECRET:-}" >> key.properties
      working-directory: ./secrets/android

    - name: Create secrets.properties
      if: steps.check_keystore.outputs.valid == 'true'
      run: |
        echo "storeFile=sign_keystore.jks" > key.properties
        echo "storePassword=${{ secrets.APK_SIGN_KEYSTORE_PASSWORD }}" >> key.properties
        echo "keyAlias=${{ secrets.APK_SIGN_ALIAS }}" >> key.properties
        echo "keyPassword=${{ secrets.APK_SIGN_PASSWORD }}" >> key.properties
      working-directory: ./secrets/android

    - name: Build Android APK
      run: ./gradlew clean :androidApp:assembleProdRelease

    - name: Get app version
      id: get_version
      run: |
        VERSION=$(grep "versionName" androidApp/build.gradle.kts | head -1 | awk -F '"' '{print $2}')
        echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Prepare APK file
      id: prepare
      run: |
        APK_FILE=$(ls androidApp/build/outputs/apk/prod/release/wxpusher-app-*.apk | head -1)
        RELEASE_APK="androidApp/build/outputs/apk/prod/release/wxpusher-app-v${{ steps.get_version.outputs.APP_VERSION }}-${{ github.run_number }}.apk"
        mv "$APK_FILE" "$RELEASE_APK"
        echo "APK_PATH=$RELEASE_APK" >> $GITHUB_OUTPUT

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: wxpusher-app-v${{ steps.get_version.outputs.APP_VERSION }}-prod-${{ github.run_number }}.apk
        path: ${{ steps.prepare.outputs.APK_PATH }}

    - name: Create GitHub Release
      if: ${{ inputs.create_release }}
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.APP_VERSION }}-Android
        name: WxPusher Android v${{ steps.get_version.outputs.APP_VERSION }}
        body: |
          ## WxPusher Android v${{ steps.get_version.outputs.APP_VERSION }}

          ${{ github.event.inputs.release_notes || '新版本发布' }}

          ---
          构建信息
          - 分支: `${{ github.ref_name }}`
          - Commit: `${{ github.sha }}`
          - Run ID: `${{ github.run_id }}`
          - 构建时间: `${{ github.event.repository.updated_at }}`
        draft: true
        prerelease: false
        files: ${{ steps.prepare.outputs.APK_PATH }}
        generate_release_notes: true
